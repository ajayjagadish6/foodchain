server {
  listen 80;
  listen [::]:80;
  server_name _;

  client_max_body_size 10m;

  root /opt/foodchain/current/frontend/dist;
  index index.html;

  # Backend: API, actuator, Swagger, uploads → Spring Boot
  location ~ ^/(api|actuator|v3|swagger-ui|uploads)(/|$) {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
  }

  # Static assets — long cache since Vite fingerprints filenames
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — all other paths serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
