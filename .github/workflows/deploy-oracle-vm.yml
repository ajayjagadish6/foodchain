name: Deploy to Oracle VM

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          MYSQL_APP_PASSWORD: ${{ secrets.MYSQL_APP_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REPO_URL: ${{ secrets.OCI_REPO_URL }}
          REPO_DIR: ${{ secrets.OCI_REPO_DIR }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_KEY }}
          port: ${{ secrets.OCI_VM_SSH_PORT || 22 }}
          envs: MYSQL_APP_PASSWORD,MYSQL_ROOT_PASSWORD,JWT_SECRET,REPO_URL,REPO_DIR
          script_stop: true
          script: |
            set -euo pipefail

            if [ -z "${REPO_URL:-}" ]; then
              REPO_URL="https://github.com/${{ github.repository }}.git"
            fi
            if [ -z "${REPO_DIR:-}" ]; then
              REPO_DIR="/opt/foodchain-src"
            fi

            if [ ! -d "${REPO_DIR}/.git" ]; then
              mkdir -p "${REPO_DIR}"
              git clone "${REPO_URL}" "${REPO_DIR}"
            fi

            cd "${REPO_DIR}"
            git fetch --prune origin
            git checkout main
            git reset --hard "origin/main"

            if [ -n "${MYSQL_ROOT_PASSWORD:-}" ]; then
              sudo -E env MYSQL_APP_PASSWORD="${MYSQL_APP_PASSWORD}" MYSQL_ROOT_PASSWORD="${MYSQL_ROOT_PASSWORD}" JWT_SECRET="${JWT_SECRET}" bash deploy/ubuntu-vm/deploy.sh
            else
              sudo -E env MYSQL_APP_PASSWORD="${MYSQL_APP_PASSWORD}" JWT_SECRET="${JWT_SECRET}" bash deploy/ubuntu-vm/deploy.sh
            fi
