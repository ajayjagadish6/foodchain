name: Deploy to Oracle VM

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Fail fast if required secrets are missing ──────────────────────────
      - name: Validate required secrets
        env:
          OCI_VM_HOST:        ${{ secrets.OCI_VM_HOST }}
          OCI_VM_USER:        ${{ secrets.OCI_VM_USER }}
          OCI_VM_SSH_KEY:     ${{ secrets.OCI_VM_SSH_KEY }}
          MYSQL_APP_PASSWORD: ${{ secrets.MYSQL_APP_PASSWORD }}
          JWT_SECRET:         ${{ secrets.JWT_SECRET }}
        run: |
          MISSING=""
          [ -z "${OCI_VM_HOST}"        ] && MISSING="${MISSING} OCI_VM_HOST"
          [ -z "${OCI_VM_USER}"        ] && MISSING="${MISSING} OCI_VM_USER"
          [ -z "${OCI_VM_SSH_KEY}"     ] && MISSING="${MISSING} OCI_VM_SSH_KEY"
          [ -z "${MYSQL_APP_PASSWORD}" ] && MISSING="${MISSING} MYSQL_APP_PASSWORD"
          [ -z "${JWT_SECRET}"         ] && MISSING="${MISSING} JWT_SECRET"
          if [ -n "${MISSING}" ]; then
            echo "::error::Required GitHub Actions secrets are not set:${MISSING}"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build frontend
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund --progress=false
          else
            npm install --no-audit --no-fund --progress=false
          fi
          npm run build

      - name: Build backend jar with bundled frontend
        run: |
          rm -rf backend/src/main/resources/static
          mkdir -p backend/src/main/resources/static
          cp -R frontend/dist/. backend/src/main/resources/static/
          mvn -f backend/pom.xml -DskipTests package
          cp backend/target/foodchain.jar foodchain.jar

      - name: Upload jar to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_KEY }}
          port: ${{ secrets.OCI_VM_SSH_PORT || 22 }}
          source: foodchain.jar
          target: /tmp

      - name: Deploy prebuilt jar over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          MYSQL_APP_PASSWORD: ${{ secrets.MYSQL_APP_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REPO_URL: ${{ secrets.OCI_REPO_URL }}
          REPO_DIR: ${{ secrets.OCI_REPO_DIR }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_KEY }}
          port: ${{ secrets.OCI_VM_SSH_PORT || 22 }}
          envs: MYSQL_APP_PASSWORD,MYSQL_ROOT_PASSWORD,JWT_SECRET,REPO_URL,REPO_DIR
          request_pty: true
          script_stop: true
          script: |
            set -eo pipefail

            # Validate secrets arrived non-empty
            if [ -z "${MYSQL_APP_PASSWORD:-}" ]; then
              echo "ERROR: MYSQL_APP_PASSWORD is empty."
              exit 1
            fi
            if [ -z "${JWT_SECRET:-}" ]; then
              echo "ERROR: JWT_SECRET is empty."
              exit 1
            fi

            REPO_URL="${REPO_URL:-https://github.com/${{ github.repository }}.git}"
            REPO_DIR="${REPO_DIR:-/opt/foodchain-src}"

            if [ ! -d "${REPO_DIR}/.git" ]; then
              mkdir -p "${REPO_DIR}"
              git clone "${REPO_URL}" "${REPO_DIR}"
            fi

            cd "${REPO_DIR}"
            git fetch --prune origin
            git checkout main
            git reset --hard "origin/main"

            # 2>&1 merges stderr into stdout so all output appears in the Actions log
            if [ -n "${MYSQL_ROOT_PASSWORD:-}" ]; then
              sudo -E env \
                MYSQL_APP_PASSWORD="${MYSQL_APP_PASSWORD}" \
                MYSQL_ROOT_PASSWORD="${MYSQL_ROOT_PASSWORD}" \
                JWT_SECRET="${JWT_SECRET}" \
                PREBUILT_JAR="/tmp/foodchain.jar" \
                bash deploy/ubuntu-vm/deploy.sh 2>&1
            else
              sudo -E env \
                MYSQL_APP_PASSWORD="${MYSQL_APP_PASSWORD}" \
                JWT_SECRET="${JWT_SECRET}" \
                PREBUILT_JAR="/tmp/foodchain.jar" \
                bash deploy/ubuntu-vm/deploy.sh 2>&1
            fi
