name: Deploy to Oracle VM

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Fail fast if required secrets are missing ──────────────────────────
      - name: Validate required secrets
        env:
          OCI_VM_HOST:        ${{ secrets.OCI_VM_HOST }}
          OCI_VM_USER:        ${{ secrets.OCI_VM_USER }}
          OCI_VM_SSH_KEY:     ${{ secrets.OCI_VM_SSH_KEY }}
          MYSQL_APP_PASSWORD: ${{ secrets.MYSQL_APP_PASSWORD }}
          JWT_SECRET:         ${{ secrets.JWT_SECRET }}
        run: |
          MISSING=""
          [ -z "${OCI_VM_HOST}"        ] && MISSING="${MISSING} OCI_VM_HOST"
          [ -z "${OCI_VM_USER}"        ] && MISSING="${MISSING} OCI_VM_USER"
          [ -z "${OCI_VM_SSH_KEY}"     ] && MISSING="${MISSING} OCI_VM_SSH_KEY"
          [ -z "${MYSQL_APP_PASSWORD}" ] && MISSING="${MISSING} MYSQL_APP_PASSWORD"
          [ -z "${JWT_SECRET}"         ] && MISSING="${MISSING} JWT_SECRET"
          if [ -n "${MISSING}" ]; then
            echo "::error::Required GitHub Actions secrets are not set:${MISSING}"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build frontend
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund --progress=false
          else
            npm install --no-audit --no-fund --progress=false
          fi
          npm run build

      - name: Build backend jar with bundled frontend
        run: |
          rm -rf backend/src/main/resources/static
          mkdir -p backend/src/main/resources/static
          cp -R frontend/dist/. backend/src/main/resources/static/
          mvn -f backend/pom.xml -DskipTests package
          cp backend/target/foodchain.jar foodchain.jar

      - name: Wait for VM SSH readiness
        run: |
          echo "${{ secrets.OCI_VM_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          echo "Waiting for VM SSH (up to 5 min)..."
          for i in $(seq 1 10); do
            if ssh -i /tmp/deploy_key \
                   -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=15 \
                   -o BatchMode=yes \
                   ${{ secrets.OCI_VM_USER }}@${{ secrets.OCI_VM_HOST }} \
                   "echo SSH_READY" 2>&1 | grep -q SSH_READY; then
              echo "VM SSH ready after attempt $i"
              exit 0
            fi
            echo "Attempt $i/10 — VM not ready, waiting 30s..."
            sleep 30
          done
          echo "VM SSH not available after 5 minutes"
          exit 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          MYSQL_APP_PASSWORD: ${{ secrets.MYSQL_APP_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REPO_URL: ${{ secrets.OCI_REPO_URL }}
          REPO_DIR: ${{ secrets.OCI_REPO_DIR }}
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_VM_SSH_KEY }}
          port: ${{ secrets.OCI_VM_SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 30m
          envs: MYSQL_APP_PASSWORD,MYSQL_ROOT_PASSWORD,JWT_SECRET,REPO_URL,REPO_DIR
          script_stop: true
          script: |
            exec 2>&1
            set -eo pipefail

            echo "==[1]== secrets check"
            [ -n "${MYSQL_APP_PASSWORD:-}" ] || { echo "FATAL: MYSQL_APP_PASSWORD is empty"; exit 1; }
            [ -n "${JWT_SECRET:-}" ]         || { echo "FATAL: JWT_SECRET is empty"; exit 1; }
            echo "==[1]== OK"

            echo "==[2]== repo sync"
            REPO_URL="${REPO_URL:-https://github.com/${{ github.repository }}.git}"
            REPO_DIR="${REPO_DIR:-/opt/foodchain-src}"
            echo "==[2a]== outbound check"
            curl -fsS --max-time 10 https://github.com > /dev/null || { echo "FATAL: VM cannot reach github.com outbound"; exit 1; }
            echo "==[2a]== OK"
            if [ ! -d "${REPO_DIR}/.git" ]; then
              echo "==[2b]== cloning (first run)"
              mkdir -p "${REPO_DIR}"
              git clone "${REPO_URL}" "${REPO_DIR}"
              echo "==[2b]== clone done"
            fi
            cd "${REPO_DIR}"
            echo "==[2c]== fetching origin"
            git fetch --prune origin
            git checkout main
            git reset --hard "origin/main"
            echo "==[2]== OK — $(git rev-parse --short HEAD)"

            echo "==[3]== sudo smoke test"
            sudo -n id || { echo "FATAL: sudo not passwordless — add ubuntu to sudoers with NOPASSWD"; exit 1; }
            echo "==[3]== OK — running as $(sudo id -un)"

            echo "==[4]== deploy.sh (building from source on VM)"
            DEPLOY_LOG=/tmp/foodchain-deploy.log
            set +e
            if [ -n "${MYSQL_ROOT_PASSWORD:-}" ]; then
              sudo -E env \
                MYSQL_APP_PASSWORD="${MYSQL_APP_PASSWORD}" \
                MYSQL_ROOT_PASSWORD="${MYSQL_ROOT_PASSWORD}" \
                JWT_SECRET="${JWT_SECRET}" \
                REPO_SOURCE="$(pwd)" \
                bash deploy/ubuntu-vm/deploy.sh >"${DEPLOY_LOG}" 2>&1
            else
              sudo -E env \
                MYSQL_APP_PASSWORD="${MYSQL_APP_PASSWORD}" \
                JWT_SECRET="${JWT_SECRET}" \
                REPO_SOURCE="$(pwd)" \
                bash deploy/ubuntu-vm/deploy.sh >"${DEPLOY_LOG}" 2>&1
            fi
            DEPLOY_EXIT=$?
            set -e
            cat "${DEPLOY_LOG}"
            [ "${DEPLOY_EXIT}" -eq 0 ] || { echo "FATAL: deploy.sh exited with status ${DEPLOY_EXIT}"; exit "${DEPLOY_EXIT}"; }
            echo "==[4]== deploy complete"
