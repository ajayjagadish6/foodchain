server:
  port: ${PORT:8080}

spring:
  application:
    name: foodchain

  # ── Email (password reset) ─────────────────────────────────────────────────
  # Set MAIL_HOST etc. to enable real sending; otherwise reset links are logged.
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS:true}

  # ── File uploads ───────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/foodchain?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:foodchain}
    password: ${DB_PASSWORD:foodchain}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

# Defaults for local/dev/prod when running on a Linux VM with local MySQL.
foodchain:
  cleanup:
    # Daily at 2:00 AM server local time.
    cron: ${DAILY_CLEANUP_CRON:0 0 2 * * *}

  security:
    jwtSecret: ${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32CHARS_MIN}
    jwtIssuer: foodchain
    jwtTtlMinutes: ${JWT_TTL_MINUTES:10080}  # 7 days

  matching:
    maxDistanceKm: ${MATCH_MAX_DISTANCE_KM:15.0}
    retryCron: ${MATCH_RETRY_CRON:0 */5 * * * *}

  uploads:
    dir: ${UPLOADS_DIR:uploads}
    urlPrefix: ${UPLOADS_URL_PREFIX:/uploads}

  app:
    baseUrl: ${APP_BASE_URL:http://localhost:5173}

  mail:
    enabled: ${FOODCHAIN_MAIL_ENABLED:false}

  sms:
    enabled: ${SMS_ENABLED:false}
    twilio:
      accountSid: ${TWILIO_ACCOUNT_SID:}
      authToken: ${TWILIO_AUTH_TOKEN:}
      fromNumber: ${TWILIO_FROM_NUMBER:}

  notifications:
    fcmEnabled: ${FCM_ENABLED:false}
    fcmServiceAccountBase64: ${FCM_SERVICE_ACCOUNT_BASE64:}
    smsNotifyDriversNewTasks: ${SMS_NOTIFY_DRIVERS_NEW_TASKS:false}

  realtime:
    bus: ${REALTIME_BUS:inmemory}
    pubsub:
      projectId: ${PUBSUB_PROJECT_ID:}
      topicId: ${PUBSUB_TOPIC_ID:foodchain-events}
      subscriptionPrefix: ${PUBSUB_SUB_PREFIX:foodchain-events-sub}

logging:
  level:
    root: INFO
    com.foodchain: INFO
