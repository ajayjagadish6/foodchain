spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:foodchain-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: false

foodchain:
  sms:
    enabled: false
  notifications:
    fcmEnabled: false
  realtime:
    bus: inmemory
